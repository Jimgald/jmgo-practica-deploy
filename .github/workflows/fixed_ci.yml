name: PR Validation

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-conventions:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name (1234-...)
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^[0-9]{4}-.+ ]]; then
            echo "Branch '$BRANCH_NAME' no cumple el formato requerido: 1234-..."
            exit 1
          fi

      - name: Validate commit messages (1234-...)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const pattern = /^[0-9]{4}-.+/;

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number, per_page: 100 }
            );

            const invalid = commits
              .map((c) => ({ sha: c.sha.substring(0, 7), message: c.commit.message.split("\n")[0] }))
              .filter((c) => !pattern.test(c.message));

            if (invalid.length > 0) {
              core.setFailed(
                "Commits con formato invalido (deben comenzar con 1234-...):\n" +
                  invalid.map((c) => `- ${c.sha}: ${c.message}`).join("\n")
              );
            }

  test-and-build:
    runs-on: ubuntu-latest
    needs: validate-conventions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run automated tests
        run: ./mvnw -B test

      - name: Build project
        run: ./mvnw -B -DskipTests package
